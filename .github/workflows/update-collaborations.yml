name: Update Collaboration Network

on:
  push:
    paths:
      - 'data/publications.json'
      - 'data/pdfs/*.pdf'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-network:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate coauthors from publications
        run: |
          python3 scripts/generate_coauthors.py

      - name: Extract affiliations (Smart - Crossref API)
        run: |
          python3 scripts/extract_affiliations_smart.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/coauthors.csv data/affiliation_cache.json data/affiliation_extraction_report.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update collaboration network [bot]" && git push)
